<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仓库库存</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',sans-serif; background:#f5f7fa; color:#333;
      display:flex; justify-content:center; align-items:start; min-height:100vh; padding:20px;
    }
    .panel {
      background:white; border-radius:16px; padding:32px; width:100%; max-width:1000px;
      box-shadow:0 4px 24px rgba(0,0,0,0.06);
    }
    h1 { text-align:center; color:#1a73e8; }
    .nav { display:flex; gap:10px; justify-content:center; margin:20px 0; flex-wrap:wrap; }
    .nav a, .nav button {
      padding:8px 18px; border:none; border-radius:8px; background:#1a73e8; color:white;
      text-decoration:none; font-weight:500; cursor:pointer; font-size:14px;
    }
    .nav button { background:#22c55e; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:10px; border-bottom:1px solid #e5e7eb; text-align:left; }
    th { background:#f9fafb; font-weight:600; }
    .item-icon {
      width:32px; height:32px; vertical-align:middle; margin-right:8px;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    .online { color:#22c55e; } .offline { color:#9ca3af; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>仓库库存 <span id="onlineStatus" class="offline">(离线数据)</span></h1>
    <div class="nav">
      <a href="/">← 主控台</a>
      <a href="/storage">📦 存储操作</a>
      <button onclick="updateWarehouse()">🔄 刷新库存</button>
    </div>
    <table>
      <thead><tr><th>图标</th><th>物品</th><th>数量</th></tr></thead>
      <tbody id="itemList"></tbody>
    </table>
  </div>
  <script>
    const API = 'http://127.0.0.1:8848';
    async function fetchWarehouse() {
      try {
        const res = await fetch(`${API}/api/warehouse`);
        const data = await res.json();
        document.getElementById('onlineStatus').textContent = data.online ? '(在线)' : '(离线数据)';
        document.getElementById('onlineStatus').className = data.online ? 'online' : 'offline';
        const list = document.getElementById('itemList');
        list.innerHTML = data.items.map(item => `
          <tr>
            <td><img class="item-icon" src="${item.icon}" onerror="this.style.display='none'"></td>
            <td>${item.displayName}</td>
            <td>${item.count}</td>
          </tr>`).join('');
      } catch (e) {
        document.getElementById('itemList').innerHTML = '<tr><td colspan="3">加载失败</td></tr>';
      }
    }
    async function updateWarehouse() {
      try { await fetch(`${API}/api/warehouse/update`, { method: 'POST' }); fetchWarehouse(); } catch (e) {}
    }
    fetchWarehouse();
    setInterval(fetchWarehouse, 10000);
  </script>
</body>
</html>

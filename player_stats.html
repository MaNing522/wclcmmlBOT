<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玩家游玩数据</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex; justify-content: center; align-items: start;
      min-height: 100vh; padding: 20px;
    }
    .panel {
      background: white;
      border-radius: 16px; padding: 32px; width: 100%; max-width: 1000px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    h1 { text-align: center; color: #1a73e8; }
    a { color: #1a73e8; text-decoration: none; }
    .nav { margin-bottom: 20px; text-align: center; }
    .nav a { margin: 0 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border-bottom: 1px solid #e5e7eb; text-align: left; }
    th { background: #f9fafb; }
    .online { color: #22c55e; font-weight: bold; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>玩家游玩数据</h1>
    <div class="nav">
      <a href="/">← 主控台</a>
      <button onclick="refresh()" style="margin-left:20px;">刷新</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>玩家名</th>
          <th>上线次数</th>
          <th>总在线时长</th>
          <th>最近上线</th>
          <th>最近下线</th>
        </tr>
      </thead>
      <tbody id="statsBody"></tbody>
    </table>
  </div>

  <script>
    const API = 'http://127.0.0.1:8848';

    async function refresh() {
      try {
        const res = await fetch(`${API}/api/playerstats`);
        const data = await res.json();
        const tbody = document.getElementById('statsBody');
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无数据</td></tr>';
          return;
        }
        tbody.innerHTML = data.map(entry => `
          <tr>
            <td>${entry.name}</td>
            <td>${entry.joinCount}</td>
            <td>${entry.totalOnlineTimeFormatted}</td>
            <td>${entry.lastJoinFormatted}</td>
            <td>${entry.lastLeaveFormatted}</td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('statsBody').innerHTML = '<tr><td colspan="5">加载失败</td></tr>';
      }
    }

    refresh();
    // 每30秒自动刷新
    setInterval(refresh, 30000);
  </script>
</body>
</html>
